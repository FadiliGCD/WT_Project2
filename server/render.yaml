services:
  - type: web
    name: recipe-meal-planner-wt2
    runtime: node
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
